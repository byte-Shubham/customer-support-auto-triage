# docker-compose.yml
version: "3.9"

services:
  api:
    build: .
    container_name: support_triage_api
    ports:
      - "8000:8000"

    # ── Environment variables ────────────────────────────────────────────
    # Never hardcode secrets here — read from .env file on the host
    env_file:
      - .env

    # ── Persistent volume for SQLite database ────────────────────────────
    # predictions.db survives container restarts
    volumes:
      - db_data:/app/data

    # ── Restart policy ───────────────────────────────────────────────────
    restart: unless-stopped

    # ── Health check ─────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ── Named volume (persists across restarts and rebuilds) ──────────────────
volumes:
  db_data:
